<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photorealistic 3D Racing</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            color: #fff;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #top-bar {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            text-shadow: 0 0 15px rgba(255, 100, 50, 0.9);
            letter-spacing: 4px;
        }

        #top-bar h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(90deg, #ff8800, #ff0055);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #speedometer {
            position: absolute;
            bottom: 40px;
            right: 40px;
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 20px 30px;
            border: 1px solid rgba(255, 100, 50, 0.4);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(255, 100, 50, 0.15);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        #speedometer .label {
            font-size: 14px;
            font-weight: 700;
            color: #ffaa88;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        #speedometer .value-container {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        #speed-value {
            color: #fff;
            font-size: 48px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 100, 50, 0.8);
            font-variant-numeric: tabular-nums;
        }

        #speedometer .unit {
            color: #ffaa88;
            font-size: 18px;
            font-weight: 700;
        }

        #controls-help {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 20px 25px;
            color: #cbd5e1;
            font-size: 14px;
            line-height: 1.8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
        }

        #controls-help strong {
            color: #fff;
            font-size: 16px;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: inline-block;
        }

        #minimap-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            border-radius: 10px;
            border: 2px solid rgba(255, 100, 50, 0.5);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.9);
        }

        #respawn-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(40, 10, 10, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: #fff;
            border: 1px solid rgba(255, 50, 50, 0.6);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(255, 50, 50, 0.4);
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #respawn-btn:hover {
            background: rgba(255, 50, 50, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 50, 50, 0.6);
            transform: scale(1.1);
        }
        
        #respawn-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>
    <div id="ui">
        <button id="respawn-btn" title="Respawn / Unflip Car">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"></polyline>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
            </svg>
        </button>
        <div id="top-bar">
            <h1>OUTRUN HORIZON</h1>
        </div>
        <div id="minimap-container"></div>
        <div id="speedometer">
            <span class="label">SPEED</span>
            <div class="value-container">
                <span id="speed-value">0</span> <span class="unit">KM/H</span>
            </div>
        </div>
        <div id="controls-help">
            <strong>DRIVING CONTROLS</strong><br>
            W / Up Arrow : Accelerate<br>
            S / Down Arrow : Brake / Reverse<br>
            A / Left Arrow : Steer Left<br>
            D / Right Arrow : Steer Right<br>
            Space : Handbrake
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script>
        // --- GAME STATE & CONSTANTS ---
        const uiSpeedValue = document.getElementById('speed-value');
        let scene, camera, renderer, minimapCamera;
        let world, physicsMaterial;
        let carChassisBody, carVehicle;
        let carVisMesh, wheelVisMeshes = [];
        let time = 0;

        // Input Map
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false, ' ': false };

        // --- PROCEDURAL TEXTURES (FOR REALISM) ---
        function createNoiseTexture(width, height, scale, intensity, colorA, colorB) {
            const canvas = document.createElement('canvas');
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = colorA; ctx.fillRect(0,0,width,height);
            for(let i=0; i<width*height * 0.1; i++) {
                ctx.fillStyle = (Math.random() > 0.5) ? colorB : colorA;
                ctx.fillRect(Math.random()*width, Math.random()*height, scale, scale);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        function createAsphaltNormalMap() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#8080ff'; // Default flat normal (Z-up in tangent space)
            ctx.fillRect(0,0,512,512);
            for(let i=0; i<30000; i++) {
                const r = 128 + (Math.random() - 0.5) * 100;
                const g = 128 + (Math.random() - 0.5) * 100;
                ctx.fillStyle = `rgb(${r},${g},255)`;
                ctx.fillRect(Math.random()*512, Math.random()*512, 1, 1);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        function createRoadColorMap() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            // Base light black asphalt
            ctx.fillStyle = '#2b2b2b'; ctx.fillRect(0,0,512,1024);
            
            // Grain
            for(let i=0; i<10000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#222' : '#333';
                ctx.fillRect(Math.random()*512, Math.random()*1024, 2, 2);
            }
            
            // Yellow lines
            ctx.fillStyle = '#ddaa00';
            ctx.fillRect(240, 0, 10, 300);
            ctx.fillRect(262, 0, 10, 300);
            ctx.fillRect(240, 600, 10, 300);
            ctx.fillRect(262, 600, 10, 300);

            // White Edge lines
            ctx.fillStyle = '#fff';
            ctx.fillRect(40, 0, 10, 1024);
            ctx.fillRect(462, 0, 10, 1024);
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        // --- INITIALIZATION ---
        function init() {
            initGraphics();
            initPhysics();
            createEnvironment();
            createCar();
            setupControls();
            initWeather();

            window.addEventListener('resize', onWindowResize, false);
            requestAnimationFrame(animate);
        }

        let rainSystem;
        let isRaining = false;
        
        function initWeather() {
            const rainCount = 5000;
            const rainGeo = new THREE.BufferGeometry();
            const rainDropPos = new Float32Array(rainCount * 3);
            for(let i=0; i<rainCount*3; i++) {
                rainDropPos[i] = (Math.random() - 0.5) * 600; // x, z spread
            }
            // Explicitly set Y heights (index 1, 4, 7...) 
            for(let i=1; i<rainCount*3; i+=3) {
                rainDropPos[i] = Math.random() * 400; // y spread
            }
            rainGeo.setAttribute('position', new THREE.BufferAttribute(rainDropPos, 3));
            
            const rainMat = new THREE.PointsMaterial({
                color: 0xccddff,
                size: 0.8,
                transparent: true,
                opacity: 0.6
            });
            rainSystem = new THREE.Points(rainGeo, rainMat);
            scene.add(rainSystem);
            
            isRaining = Math.random() < 0.2; // 20% chance of rain on start
            rainSystem.visible = isRaining;
            
            // Randomly toggle weather every 30 seconds
            setInterval(() => {
                isRaining = Math.random() < 0.2;
                rainSystem.visible = isRaining;
            }, 30000);
        }

        function initGraphics() {
            scene = new THREE.Scene();
            // Daylight foggy atmosphere
            scene.background = new THREE.Color(0xaaccff); 
            scene.fog = new THREE.FogExp2(0xaaccff, 0.003);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

            // Minimap Camera Setup
            const mapSize = 100;
            minimapCamera = new THREE.OrthographicCamera(-mapSize, mapSize, mapSize, -mapSize, 1, 500);
            minimapCamera.position.y = 200;
            minimapCamera.lookAt(0, 0, 0);
            minimapCamera.layers.enable(1);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Very soft shadows
            
            // Photorealistic HDR Rendering
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            // Generate Procedural Sunset Environment Map for realistic metallic reflections
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            pmremGenerator.compileEquirectangularShader();
            
            const envCtx = document.createElement('canvas').getContext('2d');
            envCtx.canvas.width = 1024; envCtx.canvas.height = 512;
            const gradient = envCtx.createLinearGradient(0, 0, 0, 512);
            gradient.addColorStop(0, '#2266aa'); // Deep blue sky
            gradient.addColorStop(0.45, '#88ccff'); // Lighter horizon
            gradient.addColorStop(0.5, '#ddf0ff'); // Horizon mist
            gradient.addColorStop(0.51, '#112211'); // Dark Ground
            envCtx.fillStyle = gradient;
            envCtx.fillRect(0, 0, 1024, 512);
            
            // Draw clouds
            envCtx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            for(let i=0; i<40; i++) {
                const cx = Math.random() * 1024;
                const cy = Math.random() * 200; 
                const size = 30 + Math.random() * 60;
                envCtx.beginPath();
                envCtx.arc(cx, cy, size, 0, Math.PI*2);
                envCtx.arc(cx+size*0.8, cy-size*0.2, size*0.8, 0, Math.PI*2);
                envCtx.arc(cx+size*1.2, cy+size*0.1, size*0.6, 0, Math.PI*2);
                envCtx.fill();
            }
            
            const envTex = new THREE.CanvasTexture(envCtx.canvas);
            envTex.mapping = THREE.EquirectangularReflectionMapping;
            scene.environment = pmremGenerator.fromEquirectangular(envTex).texture;
            
            // Create massive Skydome directly instead of scene.background for better gradient
            const skyGeo = new THREE.SphereGeometry(900, 32, 32);
            const skyMat = new THREE.MeshBasicMaterial({ map: envTex, side: THREE.BackSide, fog: false });
            const skyDome = new THREE.Mesh(skyGeo, skyMat);
            scene.add(skyDome);

            // Realistic Lighting
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x223322, 0.6);
            scene.add(hemiLight);

            // Daytime sun casting shadows -> REMOVED SUN per user request
        }

        function initPhysics() {
            world = new CANNON.World();
            world.gravity.set(0, -9.81, 0);
            world.broadphase = new CANNON.SAPBroadphase(world);
            world.defaultContactMaterial.friction = 0.0;

            physicsMaterial = new CANNON.Material('standard');
            const wheelMaterial = new CANNON.Material('wheel');
            const contactMaterial = new CANNON.ContactMaterial(wheelMaterial, physicsMaterial, {
                friction: 0.8, // Improved grip
                restitution: 0.1,
                contactEquationStiffness: 1000,
            });
            world.addContactMaterial(contactMaterial);
        }

        function createEnvironment() {
            // Invisible ground collider
            const groundShape = new CANNON.Plane();
            const groundBody = new CANNON.Body({ mass: 0, material: physicsMaterial });
            groundBody.addShape(groundShape);
            groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
            world.addBody(groundBody);

            // Realistic Grass Ground
            const gTex = createNoiseTexture(512, 512, 3, 0.5, '#0b1c04', '#152b0b');
            gTex.repeat.set(150, 150);
            
            const groundGeo = new THREE.PlaneGeometry(10000, 10000);
            const groundMat = new THREE.MeshStandardMaterial({ 
                color: 0x222222, // Darken background to hide void
                map: gTex, 
                roughness: 0.9,
                metalness: 0.1
            });
            const groundMesh = new THREE.Mesh(groundGeo, groundMat);
            groundMesh.rotation.x = -Math.PI / 2;
            groundMesh.receiveShadow = true;
            scene.add(groundMesh);

            // Create Closed Loop Track
            const roadWidth = 26;
            const segments = 300;
            const baseRadius = 280;
            
            // PBR Road Materials
            const roadColorTex = createRoadColorMap();
            roadColorTex.repeat.set(1, 10); // Stretch along path
            const roadNormalTex = createAsphaltNormalMap();
            roadNormalTex.repeat.set(10, 40);

            const roadMat = new THREE.MeshStandardMaterial({ 
                map: roadColorTex,
                normalMap: roadNormalTex,
                roughness: 0.7,
                metalness: 0.2 // Slightly reflective like asphalt at sunset
            });

            // Realistic sci-fi concrete and metal barrier
            const wallTex = createNoiseTexture(256, 256, 10, 0.5, '#444', '#555');
            const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 0.6, metalness: 0.4 });
            // Neon glowing markers
            const neonMat = new THREE.MeshBasicMaterial({ color: 0xff0055 });
            
            // Office/Sci-fi abstract building generation
            const bGeo = new THREE.BoxGeometry(10, 40, 10);
            const bTex = createNoiseTexture(128, 512, 16, 0.9, '#111', '#2244ff'); // Fake windows
            bTex.repeat.set(2, 8);
            const bMat = new THREE.MeshStandardMaterial({ map: bTex, roughness: 0.2, metalness: 0.8, emissive: 0x001133 });
            
            const physicsHouseShape = new CANNON.Box(new CANNON.Vec3(5, 20, 5));

            const points = [];
            for (let i = 0; i <= segments; i++) {
                const t = (i / segments) * Math.PI * 2;
                const r = baseRadius + Math.sin(t * 3) * 60 + Math.cos(t * 5) * 40 + Math.sin(t * 10) * 15;
                const x = Math.cos(t) * r;
                const z = -Math.sin(t) * r;
                points.push(new THREE.Vector3(x, 0, z));
            }

            for (let i = 0; i < segments; i++) {
                const p0 = i === 0 ? points[segments - 1] : points[i - 1];
                const p1 = points[i];
                const p2 = points[i + 1];

                const dx0 = p1.x - p0.x;
                const dz0 = p1.z - p0.z;
                const yaw0 = Math.atan2(dx0, dz0);

                const dx = p2.x - p1.x;
                const dz = p2.z - p1.z;
                const dist = Math.sqrt(dx*dx + dz*dz) || 1;
                const yaw = Math.atan2(dx, dz);

                let angleDiff = Math.abs(yaw - yaw0);
                if (angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;

                let localWidth = roadWidth + (angleDiff * 150);
                if (localWidth > 55) localWidth = 55;

                const midX = (p1.x + p2.x) / 2;
                const midZ = (p1.z + p2.z) / 2;

                if (i === 0) {
                    window.trackStartPos = new THREE.Vector3(midX, 1, midZ);
                    window.trackStartYaw = yaw;
                }

                // Smooth Road Segment
                const roadGeo = new THREE.BoxGeometry(localWidth, 0.2, dist + 1.5);
                const roadMesh = new THREE.Mesh(roadGeo, roadMat);
                roadMesh.position.set(midX, 0.1, midZ);
                roadMesh.rotation.y = yaw;
                roadMesh.receiveShadow = true;
                scene.add(roadMesh);

                const nx = Math.cos(yaw);
                const nz = -Math.sin(yaw);

                for (let side of [1, -1]) {
                    const wallX = midX + nx * side * (localWidth / 2 + 1);
                    const wallZ = midZ + nz * side * (localWidth / 2 + 1);
                    
                    const isNeon = i % 10 === 0;
                    const wGeo = new THREE.BoxGeometry(1.5, 3, dist + 1);
                    const wMesh = new THREE.Mesh(wGeo, isNeon ? neonMat : wallMat);
                    wMesh.position.set(wallX, 1.5, wallZ);
                    wMesh.rotation.y = yaw;
                    wMesh.castShadow = true;
                    wMesh.receiveShadow = true;
                    scene.add(wMesh);

                    const wallShape = new CANNON.Box(new CANNON.Vec3(0.75, 1.5, dist / 2 + 0.5));
                    const wBody = new CANNON.Body({ mass: 0, material: physicsMaterial });
                    wBody.addShape(wallShape);
                    wBody.position.set(wallX, 1.5, wallZ);
                    const q = new CANNON.Quaternion();
                    q.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), yaw);
                    wBody.quaternion.copy(q);
                    world.addBody(wBody);

                    // Scenery Buildings (Cyberpunk style)
                    if (Math.random() < 0.15 && i % 3 === 0) {
                        const offset = localWidth / 2 + 15 + Math.random() * 30;
                        const objX = midX + nx * side * offset;
                        const objZ = midZ + nz * side * offset;
                        const h = 20 + Math.random()*40;
                        
                        const building = new THREE.Mesh(new THREE.BoxGeometry(10 + Math.random()*10, h, 10 + Math.random()*10), bMat);
                        building.position.set(objX, h/2, objZ);
                        building.rotation.y = Math.random() * Math.PI;
                        building.castShadow = true;
                        building.receiveShadow = true;
                        scene.add(building);

                        const hBody = new CANNON.Body({ mass: 0, material: physicsMaterial });
                        hBody.addShape(new CANNON.Box(new CANNON.Vec3(5, h/2, 5)));
                        hBody.position.set(objX, h/2, objZ);
                        world.addBody(hBody);
                    }
                }
            }
        }

        function createCar() {
            const chassisWidth = 2.0;
            const chassisHeight = 0.5;
            const chassisLength = 4.4;
            const mass = 1500;

            // --- PHYSICS CHASSIS ---
            const chassisShape = new CANNON.Box(new CANNON.Vec3(chassisWidth * 0.5, chassisHeight * 0.5, chassisLength * 0.5));
            carChassisBody = new CANNON.Body({ mass: mass });
            carChassisBody.addShape(chassisShape, new CANNON.Vec3(0, 0.4, 0)); // Offset center of mass
            carChassisBody.position.copy(window.trackStartPos || new CANNON.Vec3(0,1,0));
            const initialQ = new CANNON.Quaternion();
            initialQ.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), window.trackStartYaw || 0);
            carChassisBody.quaternion.copy(initialQ);
            carChassisBody.angularVelocity.set(0, 0, 0);

            // --- PHOTOREALISTIC VISUAL CHASSIS (Supercar) ---
            carVisMesh = new THREE.Group();
            
            // Flake Normal map
            const flakeMap = createNoiseTexture(256, 256, 2, 0.8, '#888', '#fff');
            flakeMap.repeat.set(8, 8);

            const paintColor = 0xff1100; // Ferrari/Lambo Red
            
            // PBR Materials
            const bodyMat = new THREE.MeshPhysicalMaterial({ 
                color: paintColor, 
                metalness: 0.7, 
                roughness: 0.3,
                clearcoat: 1.0, 
                clearcoatRoughness: 0.05,
                normalMap: flakeMap, // Metallic speckle effect
                normalScale: new THREE.Vector2(0.3, 0.3)
            });
            
            const carbonFiberTex = createNoiseTexture(64, 64, 4, 1.0, '#333', '#111');
            const carbonMat = new THREE.MeshStandardMaterial({ map: carbonFiberTex, roughness: 0.7, metalness: 0.3 });
            
            const glassMat = new THREE.MeshPhysicalMaterial({ 
                color: 0x010101, 
                metalness: 0.9, 
                roughness: 0.1, 
                transmission: 0.2, // Dark tinted glass
                transparent: true
            });

            // Geometry composition (Lamborghini/Cyberpunk Wedge shape)
            
            // Main wide lower body
            const lowerBodyGeo = new THREE.BoxGeometry(chassisWidth, chassisHeight * 0.6, chassisLength);
            const lowerBody = new THREE.Mesh(lowerBodyGeo, bodyMat);
            lowerBody.position.set(0, 0.3, 0);
            lowerBody.castShadow = true;
            lowerBody.receiveShadow = true;
            carVisMesh.add(lowerBody);

            // Sleek slanted hood
            const hoodGeo = new THREE.BoxGeometry(chassisWidth*0.95, 0.3, chassisLength * 0.4);
            const hood = new THREE.Mesh(hoodGeo, bodyMat);
            hood.position.set(0, 0.45, chassisLength * 0.3);
            hood.rotation.x = 0.2; // slant down
            hood.castShadow = true;
            carVisMesh.add(hood);

            // Glass Cabin (Slanted windshield)
            const cabinGeo = new THREE.BoxGeometry(chassisWidth * 0.75, 0.5, chassisLength * 0.45);
            const cabin = new THREE.Mesh(cabinGeo, glassMat);
            cabin.position.set(0, 0.7, -0.1);
            cabin.rotation.x = 0.1;
            cabin.castShadow = true;
            carVisMesh.add(cabin);
            
            // Roof
            const roofGeo = new THREE.BoxGeometry(chassisWidth * 0.76, 0.05, chassisLength * 0.3);
            const roof = new THREE.Mesh(roofGeo, carbonMat);
            roof.position.set(0, 0.95, -0.15);
            carVisMesh.add(roof);

            // Carbon Fiber Side Skirts
            const skirtGeo = new THREE.BoxGeometry(0.1, 0.15, chassisLength * 0.9);
            const skirtL = new THREE.Mesh(skirtGeo, carbonMat);
            skirtL.position.set(-chassisWidth/2 - 0.05, 0.15, 0);
            const skirtR = new THREE.Mesh(skirtGeo, carbonMat);
            skirtR.position.set(chassisWidth/2 + 0.05, 0.15, 0);
            carVisMesh.add(skirtL); carVisMesh.add(skirtR);

            // Massive Rear carbon Spoiler
            const spoilerPillarGeo = new THREE.BoxGeometry(0.05, 0.4, 0.2);
            const pillarL = new THREE.Mesh(spoilerPillarGeo, bodyMat);
            pillarL.position.set(-chassisWidth/2 + 0.1, 0.7, -chassisLength/2 + 0.1);
            const pillarR = new THREE.Mesh(spoilerPillarGeo, bodyMat);
            pillarR.position.set(chassisWidth/2 - 0.1, 0.7, -chassisLength/2 + 0.1);
            const spoilerWing = new THREE.Mesh(new THREE.BoxGeometry(chassisWidth + 0.2, 0.05, 0.5), carbonMat);
            spoilerWing.position.set(0, 0.9, -chassisLength/2 + 0.05);
            spoilerWing.rotation.x = -0.1; // downforce angle
            spoilerWing.castShadow = true;
            carVisMesh.add(pillarL); carVisMesh.add(pillarR); carVisMesh.add(spoilerWing);
            
            // High detail LED Lights
            const tlGeo = new THREE.BoxGeometry(0.6, 0.1, 0.05);
            const tlMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            for(let i of [-1, 1]) {
                const tailLight = new THREE.Mesh(tlGeo, tlMat);
                tailLight.position.set(i * 0.6, 0.5, -chassisLength/2 - 0.01);
                carVisMesh.add(tailLight);
            }

            const hlGeo = new THREE.BoxGeometry(0.4, 0.05, 0.2);
            const hlMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); // Bright white LEDs
            for(let i of [-1, 1]) {
                const hdLight = new THREE.Mesh(hlGeo, hlMat);
                hdLight.position.set(i * (chassisWidth/2 - 0.3), 0.5, chassisLength/2 + 0.05);
                carVisMesh.add(hdLight);
            }

            // Minimap Arrow Marker (Only visible on Layer 1)
            const arrowGeo = new THREE.ConeGeometry(5, 12, 3);
            arrowGeo.rotateX(Math.PI / 2); 
            const arrowMat = new THREE.MeshBasicMaterial({ color: 0xff0055 }); 
            const minimapArrow = new THREE.Mesh(arrowGeo, arrowMat);
            minimapArrow.position.set(0, 20, 0); 
            minimapArrow.layers.set(1);
            carVisMesh.add(minimapArrow);

            scene.add(carVisMesh);

            // --- RAYCAST VEHICLE ---
            carVehicle = new CANNON.RaycastVehicle({
                chassisBody: carChassisBody,
                indexRightAxis: 0,
                indexUpAxis: 1,
                indexForwardAxis: 2
            });

            const wheelOptions = {
                radius: 0.45,
                directionLocal: new CANNON.Vec3(0, -1, 0),
                suspensionStiffness: 40,
                suspensionRestLength: 0.35,
                frictionSlip: 6, // Great grip
                dampingRelaxation: 2.3,
                dampingCompression: 4.4,
                maxSuspensionForce: 100000,
                rollInfluence: 0.1,
                axleLocal: new CANNON.Vec3(-1, 0, 0),
                chassisConnectionPointLocal: new CANNON.Vec3(1, 0, 1),
                maxSuspensionTravel: 0.3,
                customSlidingRotationalSpeed: -30,
                useCustomSlidingRotationalSpeed: true
            };

            const wX = chassisWidth/2 + 0.05;
            const wZ = chassisLength/2 - 0.7;
            wheelOptions.chassisConnectionPointLocal.set(-wX, 0.5, wZ);
            carVehicle.addWheel(wheelOptions);
            wheelOptions.chassisConnectionPointLocal.set(wX, 0.5, wZ);
            carVehicle.addWheel(wheelOptions);
            wheelOptions.chassisConnectionPointLocal.set(-wX, 0.5, -wZ);
            carVehicle.addWheel(wheelOptions);
            wheelOptions.chassisConnectionPointLocal.set(wX, 0.5, -wZ);
            carVehicle.addWheel(wheelOptions);

            carVehicle.addToWorld(world);

            // Realistic Tires Generation
            const wheelBodies = [];
            const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.35, 32);
            wheelGeo.rotateZ(Math.PI / 2);
            
            // Draw a realistic rim with canvas
            const wCanvas = document.createElement('canvas');
            wCanvas.width = 256; wCanvas.height = 256;
            const wCtx = wCanvas.getContext('2d');
            wCtx.fillStyle = '#111'; // Rubber
            wCtx.fillRect(0, 0, 256, 256);
            
            // metallic rim circles
            wCtx.beginPath();
            wCtx.arc(128, 128, 80, 0, Math.PI*2);
            wCtx.fillStyle = '#666'; // rim color
            wCtx.fill();
            
            wCtx.beginPath();
            wCtx.arc(128, 128, 20, 0, Math.PI*2);
            wCtx.fillStyle = '#aaa'; // center cap
            wCtx.fill();
            
            // spoke star
            for(let i=0; i<5; i++) {
                wCtx.save();
                wCtx.translate(128, 128);
                wCtx.rotate((Math.PI*2/5) * i);
                wCtx.fillStyle = '#444';
                wCtx.fillRect(-5, 20, 10, 60);
                wCtx.restore();
            }
            
            const wTex = new THREE.CanvasTexture(wCanvas);

            const wheelMat = new THREE.MeshStandardMaterial({ 
                color: 0x333333, 
                roughness: 0.8, 
                metalness: 0.5, // slightly reflective rims
                map: wTex 
            });

            carVehicle.wheelInfos.forEach((wheel) => {
                const wheelObj = new CANNON.Body({ mass: 1, type: CANNON.Body.KINEMATIC, collisionFilterGroup: 0 });
                const q = new CANNON.Quaternion();
                q.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), Math.PI / 2);
                const wheelShape = new CANNON.Cylinder(wheel.radius, wheel.radius, 0.35, 20);
                wheelObj.addShape(wheelShape, new CANNON.Vec3(), q);
                wheelBodies.push(wheelObj);
                world.addBody(wheelObj);

                const wMesh = new THREE.Mesh(wheelGeo, wheelMat);
                wMesh.castShadow = true;
                scene.add(wMesh);
                wheelVisMeshes.push(wMesh);
            });

            world.addEventListener('postStep', () => {
                for (let i = 0; i < carVehicle.wheelInfos.length; i++) {
                    carVehicle.updateWheelTransform(i);
                    const t = carVehicle.wheelInfos[i].worldTransform;
                    wheelBodies[i].position.copy(t.position);
                    wheelBodies[i].quaternion.copy(t.quaternion);

                    wheelVisMeshes[i].position.copy(t.position);
                    wheelVisMeshes[i].quaternion.copy(t.quaternion);
                }
            });
        }

        function setupControls() {
            window.addEventListener('keydown', (e) => {
                if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            });
            window.addEventListener('keyup', (e) => {
                if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
            });
            
            document.getElementById('respawn-btn').addEventListener('click', () => {
                if(!carChassisBody) return;
                const currentPos = carChassisBody.position;
                carChassisBody.position.set(currentPos.x, 3, currentPos.z);
                
                const euler = new THREE.Euler().setFromQuaternion(
                    new THREE.Quaternion(carChassisBody.quaternion.x, carChassisBody.quaternion.y, carChassisBody.quaternion.z, carChassisBody.quaternion.w)
                );
                const q = new CANNON.Quaternion();
                q.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), euler.y);
                carChassisBody.quaternion.copy(q);
                
                carChassisBody.velocity.set(0, 0, 0);
                carChassisBody.angularVelocity.set(0, 0, 0);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        const fixedTimeStep = 1.0 / 60.0;
        const maxSubSteps = 3;
        let lastTime = performance.now();

        function animate(now) {
            requestAnimationFrame(animate);

            const dt = (now - lastTime) / 1000;
            lastTime = now;

            const maxSteerVal = 0.5;
            const maxForce = 5000; // Ridiculous supercar speeds
            const brakeForce = 100; // Stronger drift brake

            let engineForce = 0;
            let brakeValue = 0;
            let steeringValue = 0;

            if (keys.w || keys.ArrowUp) {
                engineForce = -maxForce;
            } else if (keys.s || keys.ArrowDown) {
                engineForce = maxForce / 2;
            }

            if (keys[' ']) {
                brakeValue = brakeForce;
            }

            if (keys.a || keys.ArrowLeft) {
                steeringValue = maxSteerVal;
            } else if (keys.d || keys.ArrowRight) {
                steeringValue = -maxSteerVal;
            }

            carVehicle.applyEngineForce(engineForce, 0); // Front Right
            carVehicle.applyEngineForce(engineForce, 1); // Front Left
            carVehicle.applyEngineForce(engineForce, 2); // Rear Right
            carVehicle.applyEngineForce(engineForce, 3); // Rear Left
            carVehicle.setSteeringValue(steeringValue, 0);
            carVehicle.setSteeringValue(steeringValue, 1);
            carVehicle.setBrake(brakeValue, 0);
            carVehicle.setBrake(brakeValue, 1);
            carVehicle.setBrake(brakeValue, 2);
            carVehicle.setBrake(brakeValue, 3);

            world.step(fixedTimeStep, Math.min(dt, 0.1), maxSubSteps); // prevent physics blowout if tab pauses

            if (isRaining && rainSystem) {
                const positions = rainSystem.geometry.attributes.position.array;
                for(let i=1; i<positions.length; i+=3) {
                    positions[i] -= 200 * dt; // Fall downward
                    if(positions[i] < 0) { // reset to top
                        positions[i] = 400;
                        positions[i-1] = carVisMesh.position.x + (Math.random() - 0.5) * 600; 
                        positions[i+1] = carVisMesh.position.z + (Math.random() - 0.5) * 600;
                    }
                }
                rainSystem.geometry.attributes.position.needsUpdate = true;
            }

            carVisMesh.position.copy(carChassisBody.position);
            carVisMesh.quaternion.copy(carChassisBody.quaternion);

            const relativeCameraOffset = new THREE.Vector3(0, 3, -8);
            const cameraOffset = relativeCameraOffset.applyMatrix4(carVisMesh.matrixWorld);
            const lerpFactor = 1.0 - Math.exp(-12 * dt);
            camera.position.lerp(cameraOffset, lerpFactor);

            const lookAtPos = carVisMesh.position.clone().add(new THREE.Vector3(0, 1, 0));
            camera.lookAt(lookAtPos);

            minimapCamera.position.x = carChassisBody.position.x;
            minimapCamera.position.z = carChassisBody.position.z;
            minimapCamera.lookAt(minimapCamera.position.x, 0, minimapCamera.position.z);

            const speed = carChassisBody.velocity.length() * 3.6;
            const forwardVec = new CANNON.Vec3(0, 0, 1);
            carChassisBody.vectorToWorldFrame(forwardVec, forwardVec);
            const direction = carChassisBody.velocity.dot(forwardVec) > 0 ? 1 : -1;
            uiSpeedValue.innerText = Math.round(speed * direction);

            // Dual Pass Rendering (Main + Minimap)
            renderer.setScissorTest(true);

            renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
            renderer.setScissor(0, 0, window.innerWidth, window.innerHeight);
            renderer.render(scene, camera);

            const minimapSize = 200;
            const margin = 20;
            renderer.setViewport(window.innerWidth - minimapSize - margin, window.innerHeight - minimapSize - margin, minimapSize, minimapSize);
            renderer.setScissor(window.innerWidth - minimapSize - margin, window.innerHeight - minimapSize - margin, minimapSize, minimapSize);
            renderer.render(scene, minimapCamera);

            renderer.setScissorTest(false);
        }

        init();
    </script>
</body>

</html>
