<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photorealistic 3D Racing</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            color: #fff;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #top-bar {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            text-shadow: 0 0 15px rgba(255, 100, 50, 0.9);
            letter-spacing: 4px;
        }

        #top-bar h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(90deg, #ff8800, #ff0055);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #speedometer {
            position: absolute;
            bottom: 40px;
            right: 40px;
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 20px 30px;
            border: 1px solid rgba(255, 100, 50, 0.4);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(255, 100, 50, 0.15);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        #speedometer .label {
            font-size: 14px;
            font-weight: 700;
            color: #ffaa88;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        #speedometer .value-container {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        #speed-value {
            color: #fff;
            font-size: 48px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 100, 50, 0.8);
            font-variant-numeric: tabular-nums;
        }

        #speedometer .unit {
            color: #ffaa88;
            font-size: 18px;
            font-weight: 700;
        }

        #controls-help {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 20px 25px;
            color: #cbd5e1;
            font-size: 14px;
            line-height: 1.8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
        }

        #controls-help strong {
            color: #fff;
            font-size: 16px;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: inline-block;
        }

        #minimap-container {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: 5px solid #ff0055;
            background: radial-gradient(circle, rgba(20,0,10,0.4) 0%, rgba(0,0,0,0.8) 100%);
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.7), inset 0 0 40px rgba(255, 0, 85, 0.4);
            overflow: hidden;
            z-index: 100;
        }

        #full-map-container {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 5px solid #00f2ff;
            background: radial-gradient(circle, rgba(50,75,100,0.7) 0%, rgba(10,20,30,0.95) 100%);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.6), inset 0 0 40px rgba(0, 242, 255, 0.3);
            overflow: hidden;
            z-index: 100;
        }

        .map-label {
            position: absolute;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #fff;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0,0,0,1);
            filter: drop-shadow(0 0 5px #00f2ff);
        }

        #turn-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -180px);
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 0, 85, 1);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 25px;
            border-radius: 30px;
            border-bottom: 2px solid #ff0055;
        }
        #turn-indicator.active {
            opacity: 1;
            transform: translate(-50%, -200px);
        }

        #respawn-btn {
            position: absolute;
            top: 320px;
            left: 30px;
            background: rgba(40, 10, 10, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: #fff;
            border: 1px solid rgba(255, 50, 50, 0.6);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(255, 50, 50, 0.4);
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #respawn-btn:hover {
            background: rgba(255, 50, 50, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 50, 50, 0.6);
            transform: scale(1.1);
        }

        #respawn-btn:active {
            transform: scale(0.95);
        }

        /* ===== RACE HUD ===== */
        #race-hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        #lap-counter {
            background: rgba(10, 15, 30, 0.78);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 10px 32px;
            border: 1px solid rgba(255, 100, 50, 0.55);
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 100, 50, 0.8);
        }
        #race-timer {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 10px;
            padding: 7px 22px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 18px;
            font-weight: 700;
            color: #ffcc88;
            letter-spacing: 2px;
        }
        #countdown-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 180px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 50px rgba(255, 120, 0, 1), 0 0 100px rgba(255, 50, 0, 0.7);
            pointer-events: none;
            transition: opacity 0.25s ease;
            line-height: 1;
        }
        #race-finish-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 10, 0.88);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 20;
        }
        #race-finish-overlay h2 {
            margin: 0 0 16px;
            font-size: 68px;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #ff8800, #ff0055);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #finish-total-time {
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 3px;
            margin-bottom: 6px;
            text-shadow: 0 0 20px rgba(255,100,50,0.8);
        }
        #finish-lap-times {
            font-size: 17px;
            color: #ffaa88;
            text-align: center;
            line-height: 2.2;
            margin-bottom: 34px;
            letter-spacing: 1px;
        }
        #restart-race-btn {
            background: rgba(255, 100, 50, 0.15);
            border: 2px solid rgba(255, 100, 50, 0.7);
            border-radius: 12px;
            padding: 14px 44px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 4px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s ease;
            pointer-events: auto;
        }
        #restart-race-btn:hover {
            background: rgba(255, 100, 50, 0.45);
            transform: scale(1.06);
        }
    </style>
</head>

<body>
    <div id="ui">
        <button id="respawn-btn" title="Respawn / Unflip Car">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"></polyline>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
            </svg> Q
        </button>
        <div id="top-bar">
            <h1>OUTRUN HORIZON</h1>
        </div>
        <div id="full-map-container">
            <div class="map-label">Track Overview</div>
        </div>
        <div id="minimap-container">
            <div class="map-label">Proximity Radar</div>
        </div>
        <div id="turn-indicator">STAY LEFT</div>
        <div id="speedometer">
            <span class="label">SPEED</span>
            <div class="value-container">
                <span id="speed-value">0</span> <span class="unit">KM/H</span>
            </div>
        </div>
        <div id="controls-help">
            <strong>DRIVING CONTROLS</strong><br>
            W / Up Arrow : Accelerate<br>
            S / Down Arrow : Brake / Reverse<br>
            A / Left Arrow : Steer Left<br>
            D / Right Arrow : Steer Right<br>
            Space : Handbrake<br>
            Q : Respawn on Road
        </div>

        <!-- RACE MODE HUD -->
        <div id="race-hud">
            <div id="lap-counter">LAP 0 / 3</div>
            <div id="race-timer">00:00.000</div>
        </div>
        <div id="countdown-overlay"></div>
        <div id="race-finish-overlay">
            <h2>RACE COMPLETE!</h2>
            <div id="finish-total-time"></div>
            <div id="finish-lap-times"></div>
            <button id="restart-race-btn">RACE AGAIN</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script>
        // --- GAME STATE & CONSTANTS ---
        const uiSpeedValue = document.getElementById('speed-value');
        let scene, camera, renderer, minimapCamera, fullMapCamera;
        let world, physicsMaterial;
        let carChassisBody, carVehicle;
        let carVisMesh, wheelVisMeshes = [];
        let time = 0;

        // Texture dimensions
        const WALL_TEX_W = 512, WALL_TEX_H = 128;

        // Animated wall materials
        let oddWallMat, evenWallMat, evenWallMatRight;
        let wallAnimTime = 0;

        // ===== RACE STATE =====
        const TOTAL_LAPS = 3;
        let raceState = 'idle'; // 'idle' | 'countdown' | 'racing' | 'finished'
        let currentLap = 0;
        let raceStartTime = 0;
        let lapStartTime = 0;
        let lapTimes = [];
        let finishLineFwdX = 0, finishLineFwdZ = 1; // forward direction of finish line
        let finishLinePosX = 0, finishLinePosZ = 0;
        let prevFinishSignedDist = null;  // signed dist on previous frame
        let hasLeftFinishZone = false;    // car must travel away before lap can count

        // Input Map
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false, ' ': false, q: false };

        // Store track centre points and yaw angles for Q respawn
        const trackPoints = [];
        const trackYaws = [];

        // --- PROCEDURAL TEXTURES (FOR REALISM) ---
        function createNoiseTexture(width, height, scale, intensity, colorA, colorB) {
            const canvas = document.createElement('canvas');
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = colorA; ctx.fillRect(0, 0, width, height);
            for (let i = 0; i < width * height * 0.1; i++) {
                ctx.fillStyle = (Math.random() > 0.5) ? colorB : colorA;
                ctx.fillRect(Math.random() * width, Math.random() * height, scale, scale);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        function createAsphaltNormalMap() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#8080ff'; // Default flat normal (Z-up in tangent space)
            ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 30000; i++) {
                const r = 128 + (Math.random() - 0.5) * 100;
                const g = 128 + (Math.random() - 0.5) * 100;
                ctx.fillStyle = `rgb(${r},${g},255)`;
                ctx.fillRect(Math.random() * 512, Math.random() * 512, 1, 1);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        function createRoadColorMap() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            // Base light black asphalt
            ctx.fillStyle = '#2b2b2b'; ctx.fillRect(0, 0, 512, 1024);

            // Grain
            for (let i = 0; i < 10000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#222' : '#333';
                ctx.fillRect(Math.random() * 512, Math.random() * 1024, 2, 2);
            }

            // Yellow lines
            ctx.fillStyle = '#ddaa00';
            ctx.fillRect(240, 0, 10, 300);
            ctx.fillRect(262, 0, 10, 300);
            ctx.fillRect(240, 600, 10, 300);
            ctx.fillRect(262, 600, 10, 300);

            // White Edge lines
            ctx.fillStyle = '#fff';
            ctx.fillRect(40, 0, 10, 1024);
            ctx.fillRect(462, 0, 10, 1024);

            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        // --- INITIALIZATION ---
        // ===== HELPER: FORMAT TIME =====
        function formatTime(ms) {
            const m = Math.floor(ms / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            const cs = Math.floor((ms % 1000) / 10);
            return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
        }

        function init() {
            initGraphics();
            initPhysics();
            createEnvironment();
            createCar();
            createFinishLine();
            setupControls();
            initWeather();
            startCountdown();

            window.addEventListener('resize', onWindowResize, false);
            requestAnimationFrame(animate);
        }

        let rainSystem;
        let isRaining = false;

        function initWeather() {
            const rainCount = 5000;
            const rainGeo = new THREE.BufferGeometry();
            const rainDropPos = new Float32Array(rainCount * 3);
            for (let i = 0; i < rainCount * 3; i++) {
                rainDropPos[i] = (Math.random() - 0.5) * 1000; // x, z spread expanded
            }
            // Explicitly set Y heights (index 1, 4, 7...) 
            for (let i = 1; i < rainCount * 3; i += 3) {
                rainDropPos[i] = Math.random() * 400; // y spread
            }
            rainGeo.setAttribute('position', new THREE.BufferAttribute(rainDropPos, 3));

            const rainMat = new THREE.PointsMaterial({
                color: 0xccddff,
                size: 0.8,
                transparent: true,
                opacity: 0.6
            });
            rainSystem = new THREE.Points(rainGeo, rainMat);
            scene.add(rainSystem);

            isRaining = Math.random() < 0.2; // 20% chance of rain on start
            rainSystem.visible = isRaining;

            // Randomly toggle weather every 30 seconds
            setInterval(() => {
                isRaining = Math.random() < 0.2;
                rainSystem.visible = isRaining;
            }, 30000);
        }

        function initGraphics() {
            scene = new THREE.Scene();
            // Daylight foggy atmosphere
            scene.background = new THREE.Color(0xaaccff);
            scene.fog = new THREE.FogExp2(0xaaccff, 0.003);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

            // Minimap Camera Setup (Zoomed out for better visibility)
            const mapSize = 180;
            minimapCamera = new THREE.OrthographicCamera(-mapSize, mapSize, mapSize, -mapSize, 1, 500);
            minimapCamera.position.set(0, 200, 0);
            minimapCamera.lookAt(0, 0, 0);
            minimapCamera.layers.enable(1);

            // Full Map Camera Setup (Wide range)
            const fullMapSize = 2500;
            fullMapCamera = new THREE.OrthographicCamera(-fullMapSize, fullMapSize, fullMapSize, -fullMapSize, 1, 500);
            fullMapCamera.position.set(0, 400, 0);
            fullMapCamera.lookAt(0, 0, 0);
            fullMapCamera.layers.enable(1);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Very soft shadows

            // Photorealistic HDR Rendering
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            // Generate Procedural Sunset Environment Map for realistic metallic reflections
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            pmremGenerator.compileEquirectangularShader();

            const envCtx = document.createElement('canvas').getContext('2d');
            envCtx.canvas.width = 1024; envCtx.canvas.height = 512;
            const gradient = envCtx.createLinearGradient(0, 0, 0, 512);
            gradient.addColorStop(0, '#2266aa'); // Deep blue sky
            gradient.addColorStop(0.45, '#88ccff'); // Lighter horizon
            gradient.addColorStop(0.5, '#ddf0ff'); // Horizon mist
            gradient.addColorStop(0.51, '#112211'); // Dark Ground
            envCtx.fillStyle = gradient;
            envCtx.fillRect(0, 0, 1024, 512);

            // Draw clouds
            envCtx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            for (let i = 0; i < 40; i++) {
                const cx = Math.random() * 1024;
                const cy = Math.random() * 200;
                const size = 30 + Math.random() * 60;
                envCtx.beginPath();
                envCtx.arc(cx, cy, size, 0, Math.PI * 2);
                envCtx.arc(cx + size * 0.8, cy - size * 0.2, size * 0.8, 0, Math.PI * 2);
                envCtx.arc(cx + size * 1.2, cy + size * 0.1, size * 0.6, 0, Math.PI * 2);
                envCtx.fill();
            }

            const envTex = new THREE.CanvasTexture(envCtx.canvas);
            envTex.mapping = THREE.EquirectangularReflectionMapping;
            scene.environment = pmremGenerator.fromEquirectangular(envTex).texture;

            // Create massive Skydome directly instead of scene.background for better gradient
            const skyGeo = new THREE.SphereGeometry(900, 32, 32);
            const skyMat = new THREE.MeshBasicMaterial({ map: envTex, side: THREE.BackSide, fog: false });
            const skyDome = new THREE.Mesh(skyGeo, skyMat);
            scene.add(skyDome);

            // Realistic Lighting
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x223322, 0.6);
            scene.add(hemiLight);

            // Daytime sun casting shadows -> REMOVED SUN per user request
        }

        function initPhysics() {
            world = new CANNON.World();
            world.gravity.set(0, -9.81, 0);
            world.broadphase = new CANNON.SAPBroadphase(world);
            world.defaultContactMaterial.friction = 0.0;

            physicsMaterial = new CANNON.Material('standard');
            const wheelMaterial = new CANNON.Material('wheel');
            const contactMaterial = new CANNON.ContactMaterial(wheelMaterial, physicsMaterial, {
                friction: 0.8, // Improved grip
                restitution: 0.1,
                contactEquationStiffness: 1000,
            });
            world.addContactMaterial(contactMaterial);
        }

        function createEnvironment() {
            // Invisible ground collider
            const groundShape = new CANNON.Plane();
            const groundBody = new CANNON.Body({ mass: 0, material: physicsMaterial });
            groundBody.addShape(groundShape);
            groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
            world.addBody(groundBody);

            // Realistic Grass Ground
            const gTex = createNoiseTexture(512, 512, 3, 0.5, '#0b1c04', '#152b0b');
            gTex.repeat.set(150, 150);

            const groundGeo = new THREE.PlaneGeometry(20000, 20000);
            const groundMat = new THREE.MeshStandardMaterial({
                color: 0x222222, // Darken background to hide void
                map: gTex,
                roughness: 0.9,
                metalness: 0.1
            });
            const groundMesh = new THREE.Mesh(groundGeo, groundMat);
            groundMesh.rotation.x = -Math.PI / 2;
            groundMesh.receiveShadow = true;
            scene.add(groundMesh);

            // Create Closed Loop Track - SCALE TO EXACTLY 10KM
            // Optimized density for performance (600 segments provides smooth curves while reducing draw calls)
            const roadWidth = 26;
            const segments = 600;
            const baseRadius = 1591.5;

            // PBR Road Materials
            const roadColorTex = createRoadColorMap();
            roadColorTex.repeat.set(1, 10); // Stretch along path
            const roadNormalTex = createAsphaltNormalMap();
            roadNormalTex.repeat.set(10, 40);

            const roadMat = new THREE.MeshStandardMaterial({
                map: roadColorTex,
                normalMap: roadNormalTex,
                roughness: 0.7,
                metalness: 0.2 // Slightly reflective like asphalt at sunset
            });

            // Realistic sci-fi concrete and metal barrier
            const wallTex = createNoiseTexture(256, 256, 10, 0.5, '#444', '#555');
            const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 0.6, metalness: 0.4 });
            // Neon glowing markers
            const neonMat = new THREE.MeshBasicMaterial({ color: 0xff0055 });

            // --- ANIMATED WALL TEXTURES ---
            const W = 512, H = 128;

            // --- STATIC WALL TEXTURES (Animated via Material properties) ---

            // ODD walls: Scrolling "OUTRUN HORIZON"
            const oddCanvas = document.createElement('canvas');
            oddCanvas.width = WALL_TEX_W; oddCanvas.height = WALL_TEX_H;
            const oCtx = oddCanvas.getContext('2d');
            oCtx.fillStyle = '#1a1a2e';
            oCtx.fillRect(0, 0, WALL_TEX_W, WALL_TEX_H);
            for (let g = 0; g < 300; g++) {
                const bv = Math.floor(Math.random() * 40 + 30);
                oCtx.fillStyle = `rgba(${bv},${bv},${bv},0.3)`;
                oCtx.fillRect(Math.random() * WALL_TEX_W, Math.random() * WALL_TEX_H, 2, 2);
            }
            oCtx.strokeStyle = '#ff0055';
            oCtx.lineWidth = 2;
            oCtx.beginPath(); oCtx.moveTo(0, WALL_TEX_H * 0.72); oCtx.lineTo(WALL_TEX_W, WALL_TEX_H * 0.72); oCtx.stroke();
            oCtx.font = 'bold 52px Arial'; oCtx.textBaseline = 'middle'; oCtx.textAlign = 'center';
            oCtx.shadowColor = '#ff0055'; oCtx.shadowBlur = 18;
            oCtx.fillStyle = '#ff4400';
            oCtx.fillText('OUTRUN HORIZON', WALL_TEX_W / 2, WALL_TEX_H * 0.42);
            const wallOddTex = new THREE.CanvasTexture(oddCanvas);
            wallOddTex.wrapS = THREE.RepeatWrapping;
            oddWallMat = new THREE.MeshStandardMaterial({
                map: wallOddTex, roughness: 0.5, metalness: 0.5, emissive: 0xff0055, emissiveIntensity: 0.2
            });

            // EVEN walls: Pulsing direction arrows
            const evenCanvas = document.createElement('canvas');
            evenCanvas.width = WALL_TEX_W; evenCanvas.height = WALL_TEX_H;
            const eCtx = evenCanvas.getContext('2d');
            eCtx.fillStyle = '#0d1b2a';
            eCtx.fillRect(0, 0, WALL_TEX_W, WALL_TEX_H);
            for (let g = 0; g < 300; g++) {
                const bv = Math.floor(Math.random() * 40 + 20);
                eCtx.fillStyle = `rgba(${bv},${bv},${bv + 40},0.3)`;
                eCtx.fillRect(Math.random() * WALL_TEX_W, Math.random() * WALL_TEX_H, 2, 2);
            }
            eCtx.font = 'bold 70px Arial'; eCtx.textBaseline = 'middle'; eCtx.textAlign = 'center';
            eCtx.fillStyle = '#00ffee';
            const arrowSpacing = WALL_TEX_W / 4;
            for (let a = 0; a < 4; a++) eCtx.fillText('>', (a + 0.5) * arrowSpacing, WALL_TEX_H / 2);
            const wallEvenTex = new THREE.CanvasTexture(evenCanvas);
            wallEvenTex.wrapS = THREE.RepeatWrapping;
            evenWallMat = new THREE.MeshStandardMaterial({
                map: wallEvenTex, roughness: 0.5, metalness: 0.5, emissive: 0x00ffee, emissiveIntensity: 1.0
            });

            // EVEN RIGHT walls: Reverse direction arrows
            const evenRightCanvas = document.createElement('canvas');
            evenRightCanvas.width = WALL_TEX_W; evenRightCanvas.height = WALL_TEX_H;
            const erCtx = evenRightCanvas.getContext('2d');
            erCtx.fillStyle = '#0d1b2a';
            erCtx.fillRect(0, 0, WALL_TEX_W, WALL_TEX_H);
            for (let g = 0; g < 300; g++) {
                const bv = Math.floor(Math.random() * 40 + 20);
                erCtx.fillStyle = `rgba(${bv},${bv},${bv + 40},0.3)`;
                erCtx.fillRect(Math.random() * WALL_TEX_W, Math.random() * WALL_TEX_H, 2, 2);
            }
            erCtx.font = 'bold 70px Arial'; erCtx.textBaseline = 'middle'; erCtx.textAlign = 'center';
            erCtx.fillStyle = '#00ffee';
            for (let a = 0; a < 4; a++) erCtx.fillText('<', (a + 0.5) * arrowSpacing, WALL_TEX_H / 2);
            const wallEvenRightTex = new THREE.CanvasTexture(evenRightCanvas);
            wallEvenRightTex.wrapS = THREE.RepeatWrapping;
            evenWallMatRight = new THREE.MeshStandardMaterial({
                map: wallEvenRightTex, roughness: 0.5, metalness: 0.5, emissive: 0x00ffee, emissiveIntensity: 1.0
            });

            // Office/Sci-fi abstract building generation
            const bGeo = new THREE.BoxGeometry(10, 40, 10);
            const bTex = createNoiseTexture(128, 512, 16, 0.9, '#111', '#2244ff'); // Fake windows
            bTex.repeat.set(2, 8);
            const bMat = new THREE.MeshStandardMaterial({ map: bTex, roughness: 0.2, metalness: 0.8, emissive: 0x001133 });

            const physicsHouseShape = new CANNON.Box(new CANNON.Vec3(5, 20, 5));

            const points = [];
            for (let i = 0; i <= segments; i++) {
                const t = (i / segments) * Math.PI * 2;
                // Complex random-like winding sequence (Winding increases then stabilizes)
                const windStart = 0.12; 
                const windFactor = i/segments < windStart ? 0 : Math.min(1.0, (i/segments - windStart) * 2);
                
                const noise = windFactor * (
                    Math.sin(t * 7.5) * 160 + 
                    Math.cos(t * 13.2) * 90 + 
                    Math.sin(t * 26.8) * 45 +
                    Math.cos(t * 3.4) * 50
                );
                const r = baseRadius + noise;
                const x = Math.cos(t) * r;
                const z = -Math.sin(t) * r;
                points.push(new THREE.Vector3(x, 0, z));
            }

            for (let i = 0; i < segments; i++) {
                const p0 = i === 0 ? points[segments - 1] : points[i - 1];
                const p1 = points[i];
                const p2 = points[i + 1];

                const dx0 = p1.x - p0.x;
                const dz0 = p1.z - p0.z;
                const yaw0 = Math.atan2(dx0, dz0);

                const dx = p2.x - p1.x;
                const dz = p2.z - p1.z;
                const dist = Math.sqrt(dx * dx + dz * dz) || 1;
                const yaw = Math.atan2(dx, dz);

                let angleDiff = Math.abs(yaw - yaw0);
                if (angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;

                let localWidth = roadWidth + (angleDiff * 150);
                if (localWidth > 55) localWidth = 55;

                const midX = (p1.x + p2.x) / 2;
                const midZ = (p1.z + p2.z) / 2;

                if (i === 0) {
                    window.trackStartPos = new THREE.Vector3(midX, 1, midZ);
                    window.trackStartYaw = yaw;
                }

                // Store track centre + yaw for Q respawn
                trackPoints.push({ x: midX, z: midZ });
                trackYaws.push(yaw);

                // Smooth Road Segment
                const roadGeo = new THREE.BoxGeometry(localWidth, 0.2, dist + 1.5);
                const roadMesh = new THREE.Mesh(roadGeo, roadMat);
                roadMesh.position.set(midX, 0.1, midZ);
                roadMesh.rotation.y = yaw;
                roadMesh.receiveShadow = true;
                scene.add(roadMesh);

                // Perpendicular (normal) direction: points left/right of road
                const nx = Math.cos(yaw);
                const nz = -Math.sin(yaw);

                const wallThick = 2.5;  // thickness of wall
                const wallHeight = 3.0;
                const wallHalfThick = wallThick / 2;
                const wallHalfH = wallHeight / 2;
                const wallHalfLen = dist / 2 + 0.75;

                for (let side of [1, -1]) {
                    // Inner face of wall flush with road edge
                    const wallInnerX = midX + nx * side * (localWidth / 2);
                    const wallInnerZ = midZ + nz * side * (localWidth / 2);
                    // Wall centre offset outward by half its thickness
                    const wallX = wallInnerX + nx * side * wallHalfThick;
                    const wallZ = wallInnerZ + nz * side * wallHalfThick;

                    // Flat wall — odd: "OUTRUN HORIZON", even left: ">", even right: "<"
                    const wGeo = new THREE.BoxGeometry(wallThick, wallHeight, dist + 1.5);
                    let chosenMat;
                    if (i % 2 === 1) {
                        chosenMat = oddWallMat;
                    } else {
                        chosenMat = (side === 1) ? evenWallMat : evenWallMatRight;
                    }
                    const wMesh = new THREE.Mesh(wGeo, chosenMat);
                    wMesh.position.set(wallX, wallHalfH, wallZ);
                    wMesh.rotation.y = yaw;
                    wMesh.castShadow = true;
                    wMesh.receiveShadow = true;
                    scene.add(wMesh);

                    // Neon accent strip on TOP of every 10th wall segment (not inner face)
                    if (i % 10 === 0) {
                        const accentGeo = new THREE.BoxGeometry(wallThick + 0.05, 0.15, dist + 1.5);
                        const accent = new THREE.Mesh(accentGeo, neonMat);
                        accent.position.set(wallX, wallHeight + 0.07, wallZ);
                        accent.rotation.y = yaw;
                        scene.add(accent);
                    }

                    // Physics wall — snug against road edge
                    const wallShape = new CANNON.Box(new CANNON.Vec3(wallHalfThick, wallHalfH, wallHalfLen));
                    const wBody = new CANNON.Body({ mass: 0, material: physicsMaterial });
                    wBody.addShape(wallShape);
                    wBody.position.set(wallX, wallHalfH, wallZ);
                    const q = new CANNON.Quaternion();
                    q.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), yaw);
                    wBody.quaternion.copy(q);
                    world.addBody(wBody);

                    // Scenery Buildings (Cyberpunk style)
                    if (Math.random() < 0.15 && i % 3 === 0) {
                        const offset = localWidth / 2 + 15 + Math.random() * 30;
                        const objX = midX + nx * side * offset;
                        const objZ = midZ + nz * side * offset;
                        const h = 20 + Math.random() * 40;

                        const building = new THREE.Mesh(new THREE.BoxGeometry(10 + Math.random() * 10, h, 10 + Math.random() * 10), bMat);
                        building.position.set(objX, h / 2, objZ);
                        building.rotation.y = Math.random() * Math.PI;
                        building.castShadow = true;
                        building.receiveShadow = true;
                        scene.add(building);

                        const hBody = new CANNON.Body({ mass: 0, material: physicsMaterial });
                        hBody.addShape(new CANNON.Box(new CANNON.Vec3(5, h / 2, 5)));
                        hBody.position.set(objX, h / 2, objZ);
                        world.addBody(hBody);
                    }
                }
            }

            // --- PERFORMANCE: Merged Track Path for Maps (Layer 1 - Matte Black Overview) ---
            const curve = new THREE.CatmullRomCurve3(points, true);
            const pathGeo = new THREE.TubeGeometry(curve, 400, 25, 8, true); 
            // Render path as black for overview contrast
            const pathMesh = new THREE.Mesh(pathGeo, new THREE.MeshBasicMaterial({ color: 0x000000 }));
            pathMesh.layers.set(1); 
            scene.add(pathMesh);
        }

        // ===== FINISH LINE =====
        function createFinishLine() {
            if (!window.trackStartPos) return;
            const yaw = window.trackStartYaw || 0;

            // Store finish line world position + forward direction for lap detection
            finishLinePosX = window.trackStartPos.x;
            finishLinePosZ = window.trackStartPos.z;
            // Forward direction along the road at start (perpendicular to normal)
            finishLineFwdX = Math.sin(yaw);
            finishLineFwdZ = Math.cos(yaw);

            // --- CHECKERED FLOOR STRIPE ---
            const checkerCanvas = document.createElement('canvas');
            checkerCanvas.width = 256; checkerCanvas.height = 64;
            const cCtx = checkerCanvas.getContext('2d');
            const cols = 16, rows = 4, cw = 16, ch = 16;
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    cCtx.fillStyle = (row + col) % 2 === 0 ? '#ffffff' : '#000000';
                    cCtx.fillRect(col * cw, row * ch, cw, ch);
                }
            }
            const checkerTex = new THREE.CanvasTexture(checkerCanvas);
            const flMat = new THREE.MeshBasicMaterial({ map: checkerTex });
            const flGeo = new THREE.BoxGeometry(28, 0.18, 3.5);
            const flMesh = new THREE.Mesh(flGeo, flMat);
            flMesh.position.set(window.trackStartPos.x, 0.18, window.trackStartPos.z);
            flMesh.rotation.y = yaw;
            scene.add(flMesh);

            // --- TWO FINISH PILLARS ---
            const pillarMat = new THREE.MeshStandardMaterial({
                color: 0xffffff, roughness: 0.3, metalness: 0.5,
                emissive: 0xffffff, emissiveIntensity: 0.6
            });
            const pGeo = new THREE.BoxGeometry(0.6, 9, 0.6);

            // Perpendicular direction (sideways from road)
            const nx = Math.cos(yaw);   // same as wall code
            const nz = -Math.sin(yaw);
            const halfRoad = 14;        // half of road width 28

            for (let side of [1, -1]) {
                const px = window.trackStartPos.x + nx * side * halfRoad;
                const pz = window.trackStartPos.z + nz * side * halfRoad;
                const pillar = new THREE.Mesh(pGeo, pillarMat);
                pillar.position.set(px, 4.5, pz);
                scene.add(pillar);

                // Neon top cap
                const capMat = new THREE.MeshBasicMaterial({ color: side === 1 ? 0x00ffcc : 0xff0055 });
                const cap = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 1.2), capMat);
                cap.position.set(px, 9.3, pz);
                scene.add(cap);
            }

            // --- OVERHEAD BANNER ---
            const bannerCanvas = document.createElement('canvas');
            bannerCanvas.width = 512; bannerCanvas.height = 64;
            const bCtx = bannerCanvas.getContext('2d');
            bCtx.fillStyle = '#111';
            bCtx.fillRect(0, 0, 512, 64);
            bCtx.fillStyle = '#ffcc00';
            bCtx.font = 'bold 44px Arial';
            bCtx.textBaseline = 'middle';
            bCtx.textAlign = 'center';
            bCtx.fillText('FINISH', 256, 32);
            const bannerTex = new THREE.CanvasTexture(bannerCanvas);
            const bannerMat = new THREE.MeshBasicMaterial({ map: bannerTex, side: THREE.DoubleSide });
            const bannerMesh = new THREE.Mesh(new THREE.PlaneGeometry(28, 2), bannerMat);
            bannerMesh.position.set(window.trackStartPos.x, 9.5, window.trackStartPos.z);
            bannerMesh.rotation.y = yaw;
            scene.add(bannerMesh);
        }

        // ===== RACE LIFECYCLE =====
        function startCountdown() {
            raceState = 'countdown';
            const el = document.getElementById('countdown-overlay');
            document.getElementById('lap-counter').textContent = `LAP 0 / ${TOTAL_LAPS}`;
            document.getElementById('race-timer').textContent = '00:00.00';
            let count = 3;
            el.style.opacity = '1';
            el.style.color = '#fff';
            el.textContent = count;

            const tick = setInterval(() => {
                count--;
                if (count > 0) {
                    el.textContent = count;
                    el.style.color = count === 2 ? '#ffaa00' : '#ff4400';
                } else if (count === 0) {
                    el.textContent = 'GO!';
                    el.style.color = '#00ff88';
                    el.style.fontSize = '140px';
                } else {
                    el.style.opacity = '0';
                    clearInterval(tick);
                    startRace();
                }
            }, 1000);
        }

        function startRace() {
            raceState = 'racing';
            currentLap = 1;
            raceStartTime = performance.now();
            lapStartTime = raceStartTime;
            lapTimes = [];
            prevFinishSignedDist = null;
            hasLeftFinishZone = false;
            document.getElementById('lap-counter').textContent = `LAP 1 / ${TOTAL_LAPS}`;
        }

        function recordLap() {
            const now = performance.now();
            const lapMs = now - lapStartTime;
            lapTimes.push(lapMs);
            lapStartTime = now;

            if (currentLap >= TOTAL_LAPS) {
                finishRace(now);
            } else {
                currentLap++;
                document.getElementById('lap-counter').textContent = `LAP ${currentLap} / ${TOTAL_LAPS}`;
                // Flash lap notice
                const el = document.getElementById('countdown-overlay');
                el.style.color = '#ffcc00';
                el.style.fontSize = '90px';
                el.textContent = `LAP ${currentLap}`;
                el.style.opacity = '1';
                setTimeout(() => { el.style.opacity = '0'; el.style.fontSize = '180px'; }, 1200);
            }
        }

        function finishRace(nowMs) {
            raceState = 'finished';
            const totalMs = nowMs - raceStartTime;

            document.getElementById('finish-total-time').textContent =
                `TOTAL: ${formatTime(totalMs)}`;

            let lapHtml = '';
            lapTimes.forEach((ms, i) => {
                lapHtml += `Lap ${i + 1}:  ${formatTime(ms)}<br>`;
            });
            document.getElementById('finish-lap-times').innerHTML = lapHtml;

            const overlay = document.getElementById('race-finish-overlay');
            overlay.style.display = 'flex';
        }

        function restartRace() {
            document.getElementById('race-finish-overlay').style.display = 'none';
            // Teleport car back to start
            if (carChassisBody && window.trackStartPos) {
                carChassisBody.position.set(window.trackStartPos.x, 1.5, window.trackStartPos.z);
                carChassisBody.velocity.set(0, 0, 0);
                carChassisBody.angularVelocity.set(0, 0, 0);
                const rq = new CANNON.Quaternion();
                rq.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), window.trackStartYaw || 0);
                carChassisBody.quaternion.copy(rq);
            }
            prevFinishSignedDist = null;
            hasLeftFinishZone = false;
            startCountdown();
        }

        function createCar() {
            const chassisWidth = 2.0;
            const chassisHeight = 0.5;
            const chassisLength = 4.4;
            const mass = 1500;

            // --- PHYSICS CHASSIS ---
            const chassisShape = new CANNON.Box(new CANNON.Vec3(chassisWidth * 0.5, chassisHeight * 0.5, chassisLength * 0.5));
            carChassisBody = new CANNON.Body({ mass: mass });
            carChassisBody.addShape(chassisShape, new CANNON.Vec3(0, 0.4, 0)); // Offset center of mass
            carChassisBody.position.copy(window.trackStartPos || new CANNON.Vec3(0, 1, 0));
            const initialQ = new CANNON.Quaternion();
            initialQ.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), window.trackStartYaw || 0);
            carChassisBody.quaternion.copy(initialQ);
            carChassisBody.angularVelocity.set(0, 0, 0);
            // Damping for smooth movement — prevents spinning and sliding out
            carChassisBody.linearDamping = 0.3;
            carChassisBody.angularDamping = 0.6;

            // --- PHOTOREALISTIC VISUAL CHASSIS (Supercar) ---
            carVisMesh = new THREE.Group();

            // Flake Normal map
            const flakeMap = createNoiseTexture(256, 256, 2, 0.8, '#888', '#fff');
            flakeMap.repeat.set(8, 8);

            const paintColor = 0xff1100; // Ferrari/Lambo Red

            // PBR Materials
            const bodyMat = new THREE.MeshPhysicalMaterial({
                color: paintColor,
                metalness: 0.7,
                roughness: 0.3,
                clearcoat: 1.0,
                clearcoatRoughness: 0.05,
                normalMap: flakeMap, // Metallic speckle effect
                normalScale: new THREE.Vector2(0.3, 0.3)
            });

            const carbonFiberTex = createNoiseTexture(64, 64, 4, 1.0, '#333', '#111');
            const carbonMat = new THREE.MeshStandardMaterial({ map: carbonFiberTex, roughness: 0.7, metalness: 0.3 });

            const glassMat = new THREE.MeshPhysicalMaterial({
                color: 0x010101,
                metalness: 0.9,
                roughness: 0.1,
                transmission: 0.2, // Dark tinted glass
                transparent: true
            });

            // Geometry composition (Lamborghini/Cyberpunk Wedge shape)

            // Main wide lower body
            const lowerBodyGeo = new THREE.BoxGeometry(chassisWidth, chassisHeight * 0.6, chassisLength);
            const lowerBody = new THREE.Mesh(lowerBodyGeo, bodyMat);
            lowerBody.position.set(0, 0.3, 0);
            lowerBody.castShadow = true;
            lowerBody.receiveShadow = true;
            carVisMesh.add(lowerBody);

            // Sleek slanted hood
            const hoodGeo = new THREE.BoxGeometry(chassisWidth * 0.95, 0.3, chassisLength * 0.4);
            const hood = new THREE.Mesh(hoodGeo, bodyMat);
            hood.position.set(0, 0.45, chassisLength * 0.3);
            hood.rotation.x = 0.2; // slant down
            hood.castShadow = true;
            carVisMesh.add(hood);

            // Glass Cabin (Slanted windshield)
            const cabinGeo = new THREE.BoxGeometry(chassisWidth * 0.75, 0.5, chassisLength * 0.45);
            const cabin = new THREE.Mesh(cabinGeo, glassMat);
            cabin.position.set(0, 0.7, -0.1);
            cabin.rotation.x = 0.1;
            cabin.castShadow = true;
            carVisMesh.add(cabin);

            // Roof
            const roofGeo = new THREE.BoxGeometry(chassisWidth * 0.76, 0.05, chassisLength * 0.3);
            const roof = new THREE.Mesh(roofGeo, carbonMat);
            roof.position.set(0, 0.95, -0.15);
            carVisMesh.add(roof);

            // Carbon Fiber Side Skirts
            const skirtGeo = new THREE.BoxGeometry(0.1, 0.15, chassisLength * 0.9);
            const skirtL = new THREE.Mesh(skirtGeo, carbonMat);
            skirtL.position.set(-chassisWidth / 2 - 0.05, 0.15, 0);
            const skirtR = new THREE.Mesh(skirtGeo, carbonMat);
            skirtR.position.set(chassisWidth / 2 + 0.05, 0.15, 0);
            carVisMesh.add(skirtL); carVisMesh.add(skirtR);

            // Massive Rear carbon Spoiler
            const spoilerPillarGeo = new THREE.BoxGeometry(0.05, 0.4, 0.2);
            const pillarL = new THREE.Mesh(spoilerPillarGeo, bodyMat);
            pillarL.position.set(-chassisWidth / 2 + 0.1, 0.7, -chassisLength / 2 + 0.1);
            const pillarR = new THREE.Mesh(spoilerPillarGeo, bodyMat);
            pillarR.position.set(chassisWidth / 2 - 0.1, 0.7, -chassisLength / 2 + 0.1);
            const spoilerWing = new THREE.Mesh(new THREE.BoxGeometry(chassisWidth + 0.2, 0.05, 0.5), carbonMat);
            spoilerWing.position.set(0, 0.9, -chassisLength / 2 + 0.05);
            spoilerWing.rotation.x = -0.1; // downforce angle
            spoilerWing.castShadow = true;
            carVisMesh.add(pillarL); carVisMesh.add(pillarR); carVisMesh.add(spoilerWing);

            // High detail LED Lights
            const tlGeo = new THREE.BoxGeometry(0.6, 0.1, 0.05);
            const tlMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            for (let i of [-1, 1]) {
                const tailLight = new THREE.Mesh(tlGeo, tlMat);
                tailLight.position.set(i * 0.6, 0.5, -chassisLength / 2 - 0.01);
                carVisMesh.add(tailLight);
            }

            const hlGeo = new THREE.BoxGeometry(0.4, 0.05, 0.2);
            const hlMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); // Bright white LEDs
            for (let i of [-1, 1]) {
                const hdLight = new THREE.Mesh(hlGeo, hlMat);
                hdLight.position.set(i * (chassisWidth / 2 - 0.3), 0.5, chassisLength / 2 + 0.05);
                carVisMesh.add(hdLight);
            }

            // Minimap Arrow Marker (For Precision Proximity Map)
            const arrowGeo = new THREE.ConeGeometry(25, 60, 32); 
            arrowGeo.rotateX(Math.PI / 2);
            const arrowMat = new THREE.MeshBasicMaterial({ color: 0xff0055 });
            const minimapArrow = new THREE.Mesh(arrowGeo, arrowMat);
            minimapArrow.position.set(0, 30, 0); 
            minimapArrow.layers.set(1); // Seen on Proximity Map
            carVisMesh.add(minimapArrow);

            // Giga Dot Marker (For Track Overview Prominence)
            const dotGeo = new THREE.SphereGeometry(80, 32, 16);
            const dotMat = new THREE.MeshBasicMaterial({ color: 0xff0055 });
            const bigDot = new THREE.Mesh(dotGeo, dotMat);
            bigDot.position.set(0, 60, 0);
            bigDot.layers.set(2); // Seen on Full Map
            carVisMesh.add(bigDot);

            scene.add(carVisMesh);

            // --- RAYCAST VEHICLE ---
            carVehicle = new CANNON.RaycastVehicle({
                chassisBody: carChassisBody,
                indexRightAxis: 0,
                indexUpAxis: 1,
                indexForwardAxis: 2
            });

            const wheelOptions = {
                radius: 0.45,
                directionLocal: new CANNON.Vec3(0, -1, 0),
                suspensionStiffness: 40,
                suspensionRestLength: 0.35,
                frictionSlip: 6, // Great grip
                dampingRelaxation: 2.3,
                dampingCompression: 4.4,
                maxSuspensionForce: 100000,
                rollInfluence: 0.1,
                axleLocal: new CANNON.Vec3(-1, 0, 0),
                chassisConnectionPointLocal: new CANNON.Vec3(1, 0, 1),
                maxSuspensionTravel: 0.3,
                customSlidingRotationalSpeed: -30,
                useCustomSlidingRotationalSpeed: true
            };

            const wX = chassisWidth / 2 + 0.05;
            const wZ = chassisLength / 2 - 0.7;
            wheelOptions.chassisConnectionPointLocal.set(-wX, 0.5, wZ);
            carVehicle.addWheel(wheelOptions);
            wheelOptions.chassisConnectionPointLocal.set(wX, 0.5, wZ);
            carVehicle.addWheel(wheelOptions);
            wheelOptions.chassisConnectionPointLocal.set(-wX, 0.5, -wZ);
            carVehicle.addWheel(wheelOptions);
            wheelOptions.chassisConnectionPointLocal.set(wX, 0.5, -wZ);
            carVehicle.addWheel(wheelOptions);

            carVehicle.addToWorld(world);

            // Realistic Tires Generation
            const wheelBodies = [];
            const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.35, 32);
            wheelGeo.rotateZ(Math.PI / 2);

            // Draw a realistic rim with canvas
            const wCanvas = document.createElement('canvas');
            wCanvas.width = 256; wCanvas.height = 256;
            const wCtx = wCanvas.getContext('2d');
            wCtx.fillStyle = '#111'; // Rubber
            wCtx.fillRect(0, 0, 256, 256);

            // metallic rim circles
            wCtx.beginPath();
            wCtx.arc(128, 128, 80, 0, Math.PI * 2);
            wCtx.fillStyle = '#666'; // rim color
            wCtx.fill();

            wCtx.beginPath();
            wCtx.arc(128, 128, 20, 0, Math.PI * 2);
            wCtx.fillStyle = '#aaa'; // center cap
            wCtx.fill();

            // spoke star
            for (let i = 0; i < 5; i++) {
                wCtx.save();
                wCtx.translate(128, 128);
                wCtx.rotate((Math.PI * 2 / 5) * i);
                wCtx.fillStyle = '#444';
                wCtx.fillRect(-5, 20, 10, 60);
                wCtx.restore();
            }

            const wTex = new THREE.CanvasTexture(wCanvas);

            const wheelMat = new THREE.MeshStandardMaterial({
                color: 0x333333,
                roughness: 0.8,
                metalness: 0.5, // slightly reflective rims
                map: wTex
            });

            carVehicle.wheelInfos.forEach((wheel) => {
                const wheelObj = new CANNON.Body({ mass: 1, type: CANNON.Body.KINEMATIC, collisionFilterGroup: 0 });
                const q = new CANNON.Quaternion();
                q.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), Math.PI / 2);
                const wheelShape = new CANNON.Cylinder(wheel.radius, wheel.radius, 0.35, 20);
                wheelObj.addShape(wheelShape, new CANNON.Vec3(), q);
                wheelBodies.push(wheelObj);
                world.addBody(wheelObj);

                const wMesh = new THREE.Mesh(wheelGeo, wheelMat);
                wMesh.castShadow = true;
                scene.add(wMesh);
                wheelVisMeshes.push(wMesh);
            });

            world.addEventListener('postStep', () => {
                for (let i = 0; i < carVehicle.wheelInfos.length; i++) {
                    carVehicle.updateWheelTransform(i);
                    const t = carVehicle.wheelInfos[i].worldTransform;
                    wheelBodies[i].position.copy(t.position);
                    wheelBodies[i].quaternion.copy(t.quaternion);

                    wheelVisMeshes[i].position.copy(t.position);
                    wheelVisMeshes[i].quaternion.copy(t.quaternion);
                }
            });
        }

        function respawnOnRoad() {
            if (!carChassisBody || trackPoints.length === 0) return;
            // Find nearest track centre point
            const cx = carChassisBody.position.x;
            const cz = carChassisBody.position.z;
            let bestIdx = 0;
            let bestDist = Infinity;
            for (let i = 0; i < trackPoints.length; i++) {
                const dx = trackPoints[i].x - cx;
                const dz = trackPoints[i].z - cz;
                const d = dx * dx + dz * dz;
                if (d < bestDist) { bestDist = d; bestIdx = i; }
            }
            const tp = trackPoints[bestIdx];
            const yaw = trackYaws[bestIdx];
            carChassisBody.position.set(tp.x, 1.5, tp.z);
            carChassisBody.velocity.set(0, 0, 0);
            carChassisBody.angularVelocity.set(0, 0, 0);
            const rq = new CANNON.Quaternion();
            rq.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), yaw);
            carChassisBody.quaternion.copy(rq);
        }

        function setupControls() {
            window.addEventListener('keydown', (e) => {
                if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
                if (e.key === 'q' || e.key === 'Q') respawnOnRoad();
            });
            window.addEventListener('keyup', (e) => {
                if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
            });

            // RACE AGAIN button
            document.getElementById('restart-race-btn').addEventListener('click', restartRace);

            // Respawn button — unflip only (lifts car upright at current position)
            document.getElementById('respawn-btn').addEventListener('click', () => {
                if (!carChassisBody) return;
                const currentPos = carChassisBody.position;
                carChassisBody.position.set(currentPos.x, 3, currentPos.z);

                const euler = new THREE.Euler().setFromQuaternion(
                    new THREE.Quaternion(carChassisBody.quaternion.x, carChassisBody.quaternion.y, carChassisBody.quaternion.z, carChassisBody.quaternion.w)
                );
                const q = new CANNON.Quaternion();
                q.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), euler.y);
                carChassisBody.quaternion.copy(q);

                carChassisBody.velocity.set(0, 0, 0);
                carChassisBody.angularVelocity.set(0, 0, 0);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        const fixedTimeStep = 1.0 / 60.0;
        const maxSubSteps = 3;
        let lastTime = performance.now();

        function animate(now) {
            requestAnimationFrame(animate);

            const dt = (now - lastTime) / 1000;
            lastTime = now;

            const maxSteerVal = 0.7;   // Sharper turning
            const maxForce = 10000;      // Faster acceleration
            const brakeForce = 80;      // Smooth braking

            let engineForce = 0;
            let brakeValue = 0;
            let steeringValue = 0;

            // Block driving during countdown or post-finish
            const canDrive = (raceState === 'racing');

            if (canDrive) {
                if (keys.w || keys.ArrowUp) {
                    engineForce = -maxForce;
                } else if (keys.s || keys.ArrowDown) {
                    engineForce = maxForce / 2;
                }
                if (keys[' ']) {
                    brakeValue = brakeForce;
                }
                if (keys.a || keys.ArrowLeft) {
                    steeringValue = maxSteerVal;
                } else if (keys.d || keys.ArrowRight) {
                    steeringValue = -maxSteerVal;
                }
            }

            carVehicle.applyEngineForce(engineForce, 0); // Front Right
            carVehicle.applyEngineForce(engineForce, 1); // Front Left
            carVehicle.applyEngineForce(engineForce, 2); // Rear Right
            carVehicle.applyEngineForce(engineForce, 3); // Rear Left
            carVehicle.setSteeringValue(steeringValue, 0);
            carVehicle.setSteeringValue(steeringValue, 1);
            carVehicle.setBrake(brakeValue, 0);
            carVehicle.setBrake(brakeValue, 1);
            carVehicle.setBrake(brakeValue, 2);
            carVehicle.setBrake(brakeValue, 3);

            world.step(fixedTimeStep, Math.min(dt, 0.1), maxSubSteps); // prevent physics blowout if tab pauses

            if (isRaining && rainSystem) {
                const positions = rainSystem.geometry.attributes.position.array;
                for (let i = 1; i < positions.length; i += 3) {
                    positions[i] -= 200 * dt; // Fall downward
                    if (positions[i] < 0) { // reset to top
                        positions[i] = 400;
                        positions[i - 1] = carVisMesh.position.x + (Math.random() - 0.5) * 600;
                        positions[i + 1] = carVisMesh.position.z + (Math.random() - 0.5) * 600;
                    }
                }
                rainSystem.geometry.attributes.position.needsUpdate = true;
            }

            carVisMesh.position.copy(carChassisBody.position);
            carVisMesh.quaternion.copy(carChassisBody.quaternion);

            const relativeCameraOffset = new THREE.Vector3(0, 3, -8);
            const cameraOffset = relativeCameraOffset.applyMatrix4(carVisMesh.matrixWorld);
            const lerpFactor = 1.0 - Math.exp(-12 * dt);
            camera.position.lerp(cameraOffset, lerpFactor);

            const lookAtPos = carVisMesh.position.clone().add(new THREE.Vector3(0, 1, 0));
            camera.lookAt(lookAtPos);

            minimapCamera.position.x = carChassisBody.position.x;
            minimapCamera.position.z = carChassisBody.position.z;
            minimapCamera.lookAt(minimapCamera.position.x, 0, minimapCamera.position.z);

            const speed = Math.round(carChassisBody.velocity.length() * 3.6);
            const forwardVec = new CANNON.Vec3(0, 0, 1);
            carChassisBody.vectorToWorldFrame(forwardVec, forwardVec);
            const direction = carChassisBody.velocity.dot(forwardVec) > 0 ? 1 : -1;
            const finalSpeed = speed * direction;
            if (uiSpeedValue.innerText != finalSpeed) {
                uiSpeedValue.innerText = finalSpeed;
            }

            // ===== RACE TICK =====
            if (raceState === 'racing') {
                // Live timer
                const elapsed = performance.now() - raceStartTime;
                document.getElementById('race-timer').textContent = formatTime(elapsed);

                // Lap crossing via signed projection onto finish-line forward axis
                const relX = carChassisBody.position.x - finishLinePosX;
                const relZ = carChassisBody.position.z - finishLinePosZ;
                const signedDist = relX * finishLineFwdX + relZ * finishLineFwdZ;
                const lateralDist = Math.abs(relX * (-finishLineFwdZ) + relZ * finishLineFwdX);

                // Car is within track-width laterally (only count if car is on the road)
                if (lateralDist < 15) {
                    // Once car is far enough from the line, enable crossing detection
                    if (!hasLeftFinishZone && (Math.abs(relX) > 40 || Math.abs(relZ) > 40)) {
                        hasLeftFinishZone = true;
                    }
                    // Crossing: previous frame was behind (-), now is in front (+)
                    if (hasLeftFinishZone && prevFinishSignedDist !== null &&
                        prevFinishSignedDist < 0 && signedDist >= 0) {
                        hasLeftFinishZone = false;
                        recordLap();
                    }
                    prevFinishSignedDist = signedDist;
                }
            }

            // --- ANIMATE WALL TEXTURES (PERFORMANCE OPTIMIZED) ---
            wallAnimTime += dt;
            
            // Texture scrolling instead of canvas redraw
            if (oddWallMat.map) {
                oddWallMat.map.offset.x -= 0.15 * dt;
                oddWallMat.emissiveIntensity = 0.4 + 0.3 * Math.sin(wallAnimTime * 2.5);
            }
            if (evenWallMat) {
                evenWallMat.emissiveIntensity = 0.5 + 0.5 * Math.sin(wallAnimTime * 4);
            }
            if (evenWallMatRight) {
                evenWallMatRight.emissiveIntensity = 0.5 + 0.5 * Math.sin(wallAnimTime * 4);
            }

            // --- TURN INDICATOR LOGIC ---
            if (raceState === 'racing' && trackYaws.length > 0) {
                // Find nearest track point
                const cx = carChassisBody.position.x;
                const cz = carChassisBody.position.z;
                let bestIdx = 0; let bestDist = Infinity;
                for (let i = 0; i < trackPoints.length; i += 10) { // optimization
                    const d = Math.pow(trackPoints[i].x - cx, 2) + Math.pow(trackPoints[i].z - cz, 2);
                    if (d < bestDist) { bestDist = d; bestIdx = i; }
                }

                // Look ahead 15 segments (~75m)
                const lookAheadIdx = (bestIdx + 15) % trackPoints.length;
                const currentYaw = trackYaws[bestIdx];
                const aheadYaw = trackYaws[lookAheadIdx];
                let diff = aheadYaw - currentYaw;
                if (diff > Math.PI) diff -= Math.PI * 2;
                if (diff < -Math.PI) diff += Math.PI * 2;

                const indicator = document.getElementById('turn-indicator');
                if (Math.abs(diff) > 0.08) { // threshold for "turn approaching"
                    indicator.textContent = diff > 0 ? "STAY LEFT" : "STAY RIGHT";
                    indicator.classList.add('active');
                } else {
                    indicator.classList.remove('active');
                }
            }

            // Dual Pass Rendering (Main + Full Map + Minimap)
            renderer.setScissorTest(true);

            // 1. Main View (Everything on Layer 0)
            camera.layers.set(0); 
            renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
            renderer.setScissor(0, 0, window.innerWidth, window.innerHeight);
            renderer.render(scene, camera);

            const margin = 30;

            // 2. Full Map (Top Left - Tactical Overview)
            fullMapCamera.layers.set(2); // CAR DOT (Layer 2)
            fullMapCamera.layers.enable(1); // TRACK PATH (Layer 1)
            const fSize = 260;
            renderer.setViewport(margin, window.innerHeight - fSize - margin, fSize, fSize);
            renderer.setScissor(margin, window.innerHeight - fSize - margin, fSize, fSize);
            renderer.render(scene, fullMapCamera);

            // 3. Minimap (Top Right - Close Radar)
            minimapCamera.layers.set(1); // ARROW + PATH 
            const mSizeValue = 240;
            renderer.setViewport(window.innerWidth - mSizeValue - margin, window.innerHeight - mSizeValue - margin, mSizeValue, mSizeValue);
            renderer.setScissor(window.innerWidth - mSizeValue - margin, window.innerHeight - mSizeValue - margin, mSizeValue, mSizeValue);
            renderer.render(scene, minimapCamera);

            renderer.setScissorTest(false);
        }

        init();
    </script>
</body>
